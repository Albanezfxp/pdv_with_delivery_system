services:

  db:
    image: postgres:15
    container_name: postgres-db-pizzaria-system
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 270104
      POSTGRES_DB: pizzariadb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  backend:
    build:
      context: ./backend/pizzaria-system
      dockerfile: Dockerfile
    container_name: backend-pizzaria-system
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pizzariadb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 270104
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend # O contexto é a pasta frontend (onde estão os arquivos de build)
      dockerfile: Dockerfile # O Dockerfile do frontend está DENTRO do contexto
    container_name: frontend-pizzaria-system
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
